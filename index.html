<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mitra Kantin - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-brand">Mitra Kantin</div>
        <!-- Dynamic nav populated by JS -->
    </nav>

    <main class="container">
        <h1>Dashboard Pengelolaan Mitra Kantin</h1>
        
        <section class="stats-grid">
            <div class="stat-card">
                <h2 id="totalMitra">0</h2>
                <p>Total Mitra</p>
            </div>
            <div class="stat-card">
                <h2 id="totalProduk">0</h2>
                <p>Total Produk</p>
            </div>
            <div class="stat-card">
                <h2 id="totalTransaksi">0</h2>
                <p>Total Transaksi</p>
            </div>
        </section>

        <section class="chart-section">
            <h2>Statistik Produk per Mitra</h2>
            <canvas id="mitraChart" width="400" height="200"></canvas>
        </section>
    </main>

    <script src="js/main.js"></script>
    <script>
        // Page-specific init
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadMitraChart();
        });
    </script>
</body>
</html>
